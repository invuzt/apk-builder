name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4.2.2

    - name: set up JDK 17
      uses: actions/setup-java@v4.7.0
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4.0.0
      with:
        gradle-version: '8.7'

    - name: Build with Gradle
      run: |
        APP_PATH=$(find . -name "build.gradle" -exec grep -l "com.android.application" {} \;)
        PROJECT_ROOT=$(dirname $(dirname "$APP_PATH"))
        cd "$PROJECT_ROOT"
        
        # Optimasi Build Tanpa Cache: Jalankan secara paralel & daemon aktif
        gradle assembleDebug --parallel --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4.6.0
      with:
        name: CamRU-Professional-APK
        path: "**/build/outputs/apk/debug/*.apk"
