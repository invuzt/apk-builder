name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4.2.2

    - name: set up JDK 17
      uses: actions/setup-java@v4.7.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4.0.0

    # Solusi Aman: Cari gradlew secara otomatis dan berikan izin eksekusi
    - name: Grant execute permission for gradlew
      run: |
        GRADLEW_PATH=$(find . -name gradlew)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "ERROR: File gradlew tidak ditemukan di folder mana pun!"
          exit 1
        fi
        echo "Found gradlew at: $GRADLEW_PATH"
        chmod +x "$GRADLEW_PATH"
        echo "DIR_PATH=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

    # Jalankan build di dalam folder tempat gradlew itu berada
    - name: Build with Gradle
      run: |
        cd ${{ env.DIR_PATH }}
        ./gradlew assembleDebug

    # Cari file APK yang berhasil di-build untuk di-upload
    - name: Upload APK
      uses: actions/upload-artifact@v4.6.0
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/*.apk"
