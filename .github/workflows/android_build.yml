name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # Kita paksa pakai Gradle 8.7 yang di-host langsung oleh GitHub Actions
    - name: Setup Gradle and Build
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7' # <- MEMAKSA VERSI GRADLE GLOBAL TANPA WRAPPER
        arguments: assembleDebug
