name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # Menggunakan aksi resmi gradle untuk build otomatis, mendeteksi gradle di mana pun foldernya berada
    - name: Setup Gradle and Build
      uses: gradle/actions/setup-gradle@v3
      with:
        arguments: assembleDebug
