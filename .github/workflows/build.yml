name: Build Jetpack Compose

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Build with Gradle 8.1.1
        run: |
          # Download Gradle 8.1.1 (bukan 9.5.1)
          wget https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          unzip -q gradle-8.1.1-bin.zip
          export PATH=$PWD/gradle-8.1.1/bin:$PATH
          
          # Buat wrapper versi 8.1.1
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew
          
          # Build
          ./gradlew assembleDebug --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: compose-builder
          path: app/build/outputs/apk/debug/*.apk
